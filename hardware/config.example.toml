# Example hardware service config — copy to config.toml and edit.

[general]
log_level = "INFO"

[server]
host = "0.0.0.0"
port = 8001

[roboclaw]
port = "/dev/ttyACM0"
baudrate = 38400
address = 128
timeout_s = 0.25
# "auto" tries a real serial port and falls back to a null/disconnected client
# when not present (useful for boot-on-laptop). Set to "serial" to require it.
connect_mode = "auto"

[telemetry]
update_rate_hz = 5

[mount]
az_counts_per_degree = 1000.0
alt_counts_per_degree = 1000.0
az_zero_count = 0
alt_zero_count = 0
goto_speed_qpps = 10000
goto_accel_qpps2 = 25000
goto_decel_qpps2 = 25000
max_slew_deg_per_command = 45.0

[observer]
name = "Radio Telescope"
latitude_deg = 51.5
longitude_deg = -0.1
altitude_m = 0.0
dish_diameter_m = 2.286
observing_freq_hz = 1.42e9

[camera]
enabled = true
device = 0
fps = 15
width = 1280
height = 720
label = "Cam A"

[sdr]
enabled = true
center_freq_hz = 1.4204e9
# Airspy Mini supports 3 Msps and 6 Msps only. 3 Msps (±1.5 MHz) covers
# the full galactic H I velocity spread with headroom.
sample_rate_hz = 3.0e6
# Frequency resolution = sample_rate / fft_size. 8192 → 366 Hz bins, which
# resolves H I cloud velocity components (~5–50 km/s ≈ 24–240 kHz wide)
# across ~80+ bins instead of ~20. The FFT runs in a GNU Radio subprocess
# (NEON-optimised FFTW) so the choice is no longer bounded by NumPy on the Pi.
fft_size = 8192
# Airspy "linearity" gain index (0-21, not dB). Leave unset to enable AGC,
# but AGC chases signal and ruins spectroscopy — fix it for the H I line.
# With a Sawbird H1+ (~40 dB pre-gain) feeding the Airspy Mini, 12-14 keeps
# the ADC well below clipping while preserving SNR on the line.
gain_db = 14
# Set true if the Sawbird is powered through the Airspy's bias tee rather
# than a separate 5 V injector.
lna_bias_tee_enabled = false
# Rolling integration window for the displayed trace, in wall-clock seconds.
# Per-bin σ ≈ 1/√(integration_seconds × bin_bandwidth). 15-30 s is a good
# starting point for the galactic-plane H I line with a Sawbird-class LNA;
# go higher for weaker sightlines, lower for snappier display response.
integration_seconds = 15.0
publish_rate_hz = 5.0
