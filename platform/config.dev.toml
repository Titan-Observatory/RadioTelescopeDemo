# Dev platform config — LAN-only, no Turnstile, simple secrets.
hardware_url = "http://hardware:8001"

[general]
log_level = "INFO"

[server]
host = "0.0.0.0"
port = 8000
cors_origins = ["http://localhost:5173", "http://localhost:8000"]
allowed_clients = ["127.0.0.1"]
trusted_proxies = ["127.0.0.1"]
lan_only = true

[queue]
enabled = true
cookie_secret = "dev-cookie-secret-not-for-prod"

[auth]
enabled = false

[turnstile]
enabled = false
