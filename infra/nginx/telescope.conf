# Public SSL edge for Titan Observatory.
#
# Topology:  Internet ─443─► nginx (this box) ──HTTP─► caddy.lan ──► Pi
#
# This config terminates TLS for the public hostname and dumb-proxies every
# path to the LAN-side Caddy. Caddy serves the SPA and forwards /api and /ws
# to the backend.
#
# Replace `telescope.example.com` with the real public hostname and
# `caddy.lan:8080` with the LAN address Caddy listens on.

upstream telescope_caddy {
    server caddy.lan:8080;
    keepalive 32;
}

# HTTP → HTTPS redirect, plus ACME challenge passthrough if you use webroot.
server {
    listen 80;
    listen [::]:80;
    server_name telescope.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name telescope.example.com;

    ssl_certificate     /etc/letsencrypt/live/telescope.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telescope.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Belt-and-braces limits above the app's slowapi. Per-IP connection cap
    # plus a global request-rate cap; tune to your traffic shape.
    limit_conn_zone $binary_remote_addr zone=telescope_conn:10m;
    limit_req_zone  $binary_remote_addr zone=telescope_req:10m rate=30r/s;

    location / {
        limit_conn telescope_conn 32;
        limit_req  zone=telescope_req burst=60 nodelay;

        proxy_pass http://telescope_caddy;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # WebSocket upgrade — needed even though we dumb-proxy, otherwise the
    # handshake fails. Caddy then forwards the upgraded socket to the Pi.
    location /ws/ {
        proxy_pass http://telescope_caddy;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        # Long timeouts: telemetry/spectrum WS connections are long-lived.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
